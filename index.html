<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Ventas - Tropifrescura</title>

        :root {
            --color-primary: #27ae60;
            --color-primary-hover: #2ecc71;
            --color-danger: #e74c3c;
            --color-danger-hover: #c0392b;
            --color-secondary: #34495e;
            --color-bg: #f8f9fa;
            --color-border: #dee2e6;
            --color-shadow: rgba(0,0,0,0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--color-bg);
            padding: 20px;
            line-height: 1.6;
        }

        .container { 
            max-width: 1200px;
            margin: auto;
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 20px var(--color-shadow);
        }

        h1 {
            color: var(--color-secondary);
            margin-bottom: 10px;
            font-size: 2rem;
        }

        h2 {
            color: var(--color-secondary);
            margin: 30px 0 20px 0;
            padding-bottom: 10px;
            border-bottom: 3px solid var(--color-primary);
        }

        h3 {
            color: var(--color-secondary);
            margin: 20px 0 15px 0;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #555;
        }

        select, input {
            width: 100%;
            padding: 12px;
            border: 2px solid var(--color-border);
            border-radius: 6px;
            font-size: 15px;
            transition: border-color 0.3s;
        }

        select:focus, input:focus {
            outline: none;
            border-color: var(--color-primary);
        }

        button {
            padding: 12px 24px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 600;
            transition: all 0.3s;
            margin-right: 10px;
            margin-top: 10px;
        }

        .btn-primary {
            background: var(--color-primary);
            color: white;
        }

        .btn-primary:hover {
            background: var(--color-primary-hover);
            transform: translateY(-2px);
            box-shadow: 0 4px 8px var(--color-shadow);
        }

        .btn-danger {
            background: var(--color-danger);
            color: white;
        }

        .btn-danger:hover {
            background: var(--color-danger-hover);
        }

        .btn-secondary {
            background: #7f8c8d;
            color: white;
        }

        .btn-secondary:hover {
            background: #95a5a6;
        }

        .btn-small {
            padding: 6px 12px;
            font-size: 14px;
            margin: 0;
        }

        .btn-export {
            background: #3498db;
            color: white;
        }

        .btn-export:hover {
            background: #2980b9;
        }

        .admin-section {
            margin-top: 50px;
            padding-top: 30px;
            border-top: 3px solid var(--color-border);
        }

        .admin-login, .admin-panel {
            background: #ecf0f1;
            padding: 25px;
            border-radius: 8px;
        }

        .message {
            padding: 15px;
            margin: 20px 0;
            border-radius: 6px;
            display: none;
            font-weight: 600;
        }

        .success {
            background: #d4edda;
            color: #155724;
            border: 2px solid #c3e6cb;
            display: block;
        }

        .error {
            background: #f8d7da;
            color: #721c24;
            border: 2px solid #f5c6cb;
            display: block;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
            font-size: 14px;
        }

        th, td {
            border: 1px solid var(--color-border);
            padding: 12px;
            text-align: left;
        }

        th {
            background: var(--color-secondary);
            color: white;
            font-weight: 600;
        }

        tr:nth-child(even) {
            background: #f8f9fa;
        }

        tr:hover {
            background: #e9ecef;
        }

        .total-row {
            font-weight: bold;
            background: #d5dbdb !important;
            font-size: 16px;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin: 20px 0;
        }

        .stat-card {
            background: linear-gradient(135deg, var(--color-primary) 0%, #229954 100%);
            color: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 8px var(--color-shadow);
        }

        .stat-label {
            font-size: 14px;
            opacity: 0.9;
            margin-bottom: 5px;
        }

        .stat-value {
            font-size: 28px;
            font-weight: bold;
        }

        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            border-bottom: 2px solid var(--color-border);
        }

        .tab {
            padding: 12px 24px;
            background: transparent;
            border: none;
            border-bottom: 3px solid transparent;
            cursor: pointer;
            font-weight: 600;
            color: #7f8c8d;
            transition: all 0.3s;
        }

        .tab.active {
            color: var(--color-primary);
            border-bottom-color: var(--color-primary);
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        .venta-item {
            background: white;
            border: 1px solid var(--color-border);
            border-radius: 6px;
            padding: 15px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .venta-info {
            flex: 1;
        }

        .venta-fecha {
            font-size: 12px;
            color: #7f8c8d;
            margin-bottom: 5px;
        }

        .venta-producto {
            font-weight: 600;
            color: var(--color-secondary);
        }

        .venta-detalles {
            font-size: 14px;
            color: #555;
            margin-top: 5px;
        }

        .actions {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }

        @media (max-width: 768px) {
            .container {
                padding: 20px;
            }

            h1 {
                font-size: 1.5rem;
            }

            .stats-grid {
                grid-template-columns: 1fr;
            }

            table {
                font-size: 12px;
            }

            th, td {
                padding: 8px;
            }
        }
    </style>
</head>

<div class="container">
    <h1>🍹 Sistema de Ventas - Tropifrescura</h1>
    <p style="color: #7f8c8d; margin-bottom: 30px;">Registro de ventas y gestión de productos</p>

    <!-- Sección de registro de ventas -->
    <h2>📝 Registrar Nueva Venta</h2>
    <div class="form-group">
        <label for="categoria">Categoría:</label>
        <select id="categoria" onchange="cargarProductos()">
            <option value="">-- Selecciona una categoría --</option>
        </select>
    </div>
    <div class="form-group">
        <label for="producto">Producto:</label>
        <select id="producto">
            <option value="">-- Primero elige una categoría --</option>
        </select>
    </div>
    <div class="form-group">
        <label for="cantidad">Cantidad:</label>
        <input type="number" id="cantidad" min="1" value="1">
    </div>
    <button class="btn-primary" onclick="registrarVenta()">✓ Registrar Venta</button>
    <div id="mensaje" class="message"></div>

    <!-- Sección de administración -->
    <div class="admin-section">
        <h2>🔐 Panel de Administración</h2>
        
        <div id="adminLogin" class="admin-login">
            <label for="password">Contraseña de administrador:</label>
            <input type="password" id="password" placeholder="Ingresa la contraseña">
            <button class="btn-primary" onclick="loginAdmin()">Iniciar Sesión</button>
        </div>

        <div id="adminPanel" class="admin-panel" style="display:none;">
            <div class="actions">
                <button class="btn-secondary" onclick="cerrarSesion()">Cerrar Sesión</button>
                <button class="btn-export" onclick="exportarCSV()">📊 Exportar a CSV</button>
                <button class="btn-danger" onclick="reiniciarVentas()">🗑️ Eliminar Todas las Ventas</button>
            </div>

            <!-- Estadísticas -->
            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-label">Total Ventas</div>
                    <div class="stat-value" id="totalVentas">0</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">Productos Vendidos</div>
                    <div class="stat-value" id="totalProductos">0</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">Ingresos Totales</div>
                    <div class="stat-value" id="ingresosTotal">$0</div>
                </div>
            </div>

            <!-- Tabs -->
            <div class="tabs">
                <button class="tab active" onclick="cambiarTab('resumen')">📊 Resumen por Producto</button>
                <button class="tab" onclick="cambiarTab('historial')">📜 Historial de Ventas</button>
            </div>

            <!-- Contenido de tabs -->
            <div id="tabResumen" class="tab-content active">
                <div id="resumenVentas"></div>
            </div>

            <div id="tabHistorial" class="tab-content">
                <div id="historialVentas"></div>
            </div>
        </div>
    </div>
</div>

    // ==============================================================
    // CONFIGURACIÓN
    // ==============================================================
    const STORAGE_KEY = 'tropifrescura_ventas';
    const ADMIN_PASSWORD = 'admin123';

    // ==============================================================
    // INICIALIZACIÓN
    // ==============================================================
    window.onload = function() {
        cargarCategorias();
    };

    function cargarCategorias() {
        const categorias = [...new Set(productos.map(p => p.categoria))].sort();
        const selectCategoria = document.getElementById('categoria');
        categorias.forEach(cat => {
            const option = document.createElement('option');
            option.value = cat;
            option.textContent = cat;
            selectCategoria.appendChild(option);
        });
    }

    // ==============================================================
    // GESTIÓN DE PRODUCTOS
    // ==============================================================
    function cargarProductos() {
        const categoria = document.getElementById('categoria').value;
        const selectProducto = document.getElementById('producto');
        selectProducto.innerHTML = '<option value="">-- Selecciona un producto --</option>';
        
        if (!categoria) return;

        const filtrados = productos.filter(p => p.categoria === categoria);
        filtrados.sort((a, b) => a.nombre.localeCompare(b.nombre));
        
        filtrados.forEach(p => {
            const option = document.createElement('option');
            option.value = JSON.stringify({ nombre: p.nombre, tamaño: p.tamaño, precio: p.precio });
            option.textContent = `${p.nombre} (${p.tamaño}) - $${p.precio}`;
            selectProducto.appendChild(option);
        });
    }

    // ==============================================================
    // REGISTRO DE VENTAS
    // ==============================================================
    function registrarVenta() {
        const categoria = document.getElementById('categoria').value;
        const productoSelect = document.getElementById('producto');
        const cantidad = parseInt(document.getElementById('cantidad').value);

        if (!categoria) {
            mostrarMensaje('Debes seleccionar una categoría', 'error');
            return;
        }
        if (!productoSelect.value) {
            mostrarMensaje('Debes seleccionar un producto', 'error');
            return;
        }
        if (isNaN(cantidad) || cantidad < 1) {
            mostrarMensaje('La cantidad debe ser mayor a 0', 'error');
            return;
        }

        const producto = JSON.parse(productoSelect.value);
        const venta = {
            id: Date.now() + Math.random(),
            producto: {
                categoria: categoria,
                nombre: producto.nombre,
                tamaño: producto.tamaño,
                precio: producto.precio
            },
            cantidad: cantidad,
            total: cantidad * producto.precio,
            timestamp: new Date().toISOString()
        };

        let ventas = obtenerVentas();
        ventas.push(venta);
        guardarVentas(ventas);

        mostrarMensaje('✓ Venta registrada correctamente', 'success');
        document.getElementById('cantidad').value = 1;
        
        if (document.getElementById('adminPanel').style.display === 'block') {
            actualizarAdminPanel();
        }
    }

    function mostrarMensaje(texto, tipo) {
        const mensajeDiv = document.getElementById('mensaje');
        mensajeDiv.textContent = texto;
        mensajeDiv.className = `message ${tipo}`;
        setTimeout(() => {
            mensajeDiv.className = 'message';
        }, 3000);
    }

    // ==============================================================
    // GESTIÓN DE DATOS (localStorage)
    // ==============================================================
    function obtenerVentas() {
        const ventas = localStorage.getItem(STORAGE_KEY);
        return ventas ? JSON.parse(ventas) : [];
    }

    function guardarVentas(ventas) {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(ventas));
    }

    function eliminarVenta(ventaId) {
        if (!confirm('¿Estás seguro de eliminar esta venta?')) return;
        
        let ventas = obtenerVentas();
        ventas = ventas.filter(v => v.id !== ventaId);
        guardarVentas(ventas);
        
        actualizarAdminPanel();
        mostrarMensaje('✓ Venta eliminada', 'success');
    }

    function reiniciarVentas() {
        if (!confirm('⚠️ ¿Estás seguro de eliminar TODAS las ventas registradas?\n\nEsta acción no se puede deshacer.')) return;
        
        localStorage.removeItem(STORAGE_KEY);
        actualizarAdminPanel();
        alert('✓ Todas las ventas han sido eliminadas');
    }

    // ==============================================================
    // ADMINISTRACIÓN
    // ==============================================================
    function loginAdmin() {
        const pwd = document.getElementById('password').value;
        if (pwd === ADMIN_PASSWORD) {
            document.getElementById('adminLogin').style.display = 'none';
            document.getElementById('adminPanel').style.display = 'block';
            actualizarAdminPanel();
        } else {
            alert('❌ Contraseña incorrecta');
        }
    }

    function cerrarSesion() {
        document.getElementById('adminLogin').style.display = 'block';
        document.getElementById('adminPanel').style.display = 'none';
        document.getElementById('password').value = '';
    }

    function cambiarTab(tab) {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
        
        if (tab === 'resumen') {
            document.querySelector('.tab:nth-child(1)').classList.add('active');
            document.getElementById('tabResumen').classList.add('active');
        } else if (tab === 'historial') {
            document.querySelector('.tab:nth-child(2)').classList.add('active');
            document.getElementById('tabHistorial').classList.add('active');
        }
    }

    function actualizarAdminPanel() {
        actualizarEstadisticas();
        actualizarResumenVentas();
        actualizarHistorialVentas();
    }

    // ==============================================================
    // ESTADÍSTICAS
    // ==============================================================
    function actualizarEstadisticas() {
        const ventas = obtenerVentas();
        const totalVentas = ventas.length;
        const totalProductos = ventas.reduce((sum, v) => sum + v.cantidad, 0);
        const ingresosTotal = ventas.reduce((sum, v) => sum + v.total, 0);

        document.getElementById('totalVentas').textContent = totalVentas;
        document.getElementById('totalProductos').textContent = totalProductos;
        document.getElementById('ingresosTotal').textContent = `$${ingresosTotal.toFixed(2)}`;
    }

    // ==============================================================
    // RESUMEN POR PRODUCTO
    // ==============================================================
    function actualizarResumenVentas() {
        const ventas = obtenerVentas();
        const resumen = {};

        ventas.forEach(v => {
            const key = `${v.producto.categoria}|${v.producto.nombre}|${v.producto.tamaño}`;
            if (!resumen[key]) {
                resumen[key] = {
                    categoria: v.producto.categoria,
                    nombre: v.producto.nombre,
                    tamaño: v.producto.tamaño,
                    precio: v.producto.precio,
                    cantidad: 0,
                    ingreso: 0
                };
            }
            resumen[key].cantidad += v.cantidad;
            resumen[key].ingreso += v.total;
        });

        let html = '<table><thead><tr><th>Categoría</th><th>Producto</th><th>Tamaño</th><th>Precio Unit.</th><th>Cant. Vendida</th><th>Ingreso Total</th></tr></thead><tbody>';
        
        const sorted = Object.values(resumen).sort((a, b) => b.ingreso - a.ingreso);
        let totalGeneral = 0;
        
        sorted.forEach(item => {
            html += `<tr>
                <td>${item.categoria}</td>
                <td><strong>${item.nombre}</strong></td>
                <td>${item.tamaño}</td>
                <td>$${item.precio.toFixed(2)}</td>
                <td>${item.cantidad}</td>
                <td><strong>$${item.ingreso.toFixed(2)}</strong></td>
            </tr>`;
            totalGeneral += item.ingreso;
        });
        
        html += `<tr class="total-row"><td colspan="5">TOTAL GENERAL</td><td>$${totalGeneral.toFixed(2)}</td></tr>`;
        html += '</tbody></table>';
        
        document.getElementById('resumenVentas').innerHTML = html;
    }

    // ==============================================================
    // HISTORIAL DE VENTAS
    // ==============================================================
    function actualizarHistorialVentas() {
        const ventas = obtenerVentas();
        
        if (ventas.length === 0) {
            document.getElementById('historialVentas').innerHTML = '<p style="text-align:center; color:#7f8c8d; padding:40px;">No hay ventas registradas</p>';
            return;
        }

        const ventasOrdenadas = ventas.sort((a, b) => new Date(b.timestamp) - new Date(a.timestamp));
        
        let html = '';
        ventasOrdenadas.forEach(v => {
            const fecha = new Date(v.timestamp);
            const fechaFormato = fecha.toLocaleDateString('es-DO', { 
                year: 'numeric', 
                month: 'short', 
                day: 'numeric',
                hour: '2-digit',
                minute: '2-digit'
            });

            html += `
                <div class="venta-item">
                    <div class="venta-info">
                        <div class="venta-fecha">${fechaFormato}</div>
                        <div class="venta-producto">${v.producto.nombre} (${v.producto.tamaño})</div>
                        <div class="venta-detalles">
                            ${v.producto.categoria} • 
                            Cantidad: ${v.cantidad} • 
                            Precio: $${v.producto.precio} • 
                            <strong>Total: $${v.total.toFixed(2)}</strong>
                        </div>
                    </div>
                    <button class="btn-danger btn-small" onclick="eliminarVenta(${v.id})">🗑️ Eliminar</button>
                </div>
            `;
        });
        
        document.getElementById('historialVentas').innerHTML = html;
    }

    // ==============================================================
    // EXPORTAR A CSV
    // ==============================================================
    function exportarCSV() {
        const ventas = obtenerVentas();
        
        if (ventas.length === 0) {
            alert('No hay ventas para exportar');
            return;
        }

        let csv = 'Fecha,Hora,Categoría,Producto,Tamaño,Precio Unitario,Cantidad,Total\n';
        
        ventas.forEach(v => {
            const fecha = new Date(v.timestamp);
            const fechaStr = fecha.toLocaleDateString('es-DO');
            const horaStr = fecha.toLocaleTimeString('es-DO');
            
            csv += `"${fechaStr}","${horaStr}","${v.producto.categoria}","${v.producto.nombre}","${v.producto.tamaño}",${v.producto.precio},${v.cantidad},${v.total}\n`;
        });

        const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
        const link = document.createElement('a');
        const url = URL.createObjectURL(blob);
        
        link.setAttribute('href', url);
        link.setAttribute('download', `ventas_tropifrescura_${new Date().toISOString().split('T')[0]}.csv`);
        link.style.visibility = 'hidden';
        
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
    }
</script>

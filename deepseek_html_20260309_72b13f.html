        .seccion-empleado { background: #fefcf7; border-radius: 24px; padding: 24px; box-shadow: inset 0 1px 4px #ddd; }

        .form-group { flex: 1 1 200px; }
        label { display: block; margin-bottom: 6px; font-weight: 600; color: #3e2c1c; font-size: 0.9rem; text-transform: uppercase; letter-spacing: 0.5px; }
        select, input, button { width: 100%; padding: 12px 16px; border: 1px solid #d6c6b2; border-radius: 40px; font-size: 1rem; background: white; transition: 0.2s; }
        select:focus, input:focus { outline: none; border-color: #b37b4c; box-shadow: 0 0 0 3px rgba(179,123,76,0.2); }
        button { background: #5a3e2b; color: white; font-weight: 600; border: none; cursor: pointer; }
        button:hover { background: #7a5a42; }
        .btn-registrar { background: #2b7a4b; }
        .btn-registrar:hover { background: #3e9e62; }
        .mensaje { margin-top: 16px; padding: 12px; border-radius: 40px; display: none; }
        .mensaje.success { background: #dff0d8; color: #2b5e2b; display: block; }
        .mensaje.error { background: #f2dede; color: #a63a3a; display: block; }
        hr { border: none; border-top: 2px dashed #d6c6b2; margin: 40px 0; }
        .admin-login, .admin-panel { background: #f2ede7; border-radius: 24px; padding: 24px; }
        .admin-panel { background: #e7dfd5; }
        .flex-row { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; background: white; border-radius: 16px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        th { background: #8b6f4c; color: white; font-weight: 600; padding: 12px; text-align: left; }
        td { padding: 12px; border-bottom: 1px solid #ddd; }
        tr:last-child td { border-bottom: none; }
        .total-row { background: #d4c3aa; font-weight: bold; }
        .btn-cierre { background: #7f8c8d; }
        .btn-reset { background: #c44536; }
        .btn-reset:hover { background: #a53527; }
        .oculto { display: none; }
    </style>
</head>

    // Inicializar categorías en el select
    window.onload = function() {
        const categorias = [...new Set(productos.map(p => p.categoria))].sort();
        const selectCat = document.getElementById('categoria');
        categorias.forEach(cat => {
            const opt = document.createElement('option');
            opt.value = cat;
            opt.textContent = cat;
            selectCat.appendChild(opt);
        });
        actualizarResumenAdmin(); // por si ya hay ventas guardadas
    };

    // Cargar productos según categoría
    function cargarProductos() {
        const categoria = document.getElementById('categoria').value;
        const selectProd = document.getElementById('producto');
        selectProd.innerHTML = '<option value="">-- Selecciona producto --</option>';
        if (!categoria) return;

        const filtrados = productos.filter(p => p.categoria === categoria);
        filtrados.sort((a, b) => a.nombre.localeCompare(b.nombre));
        filtrados.forEach(p => {
            const opt = document.createElement('option');
            opt.value = JSON.stringify({
                nombre: p.nombre,
                tamaño: p.tamaño,
                precio: p.precio
            });
            opt.textContent = `${p.nombre} (${p.tamaño}) · $${p.precio}`;
            selectProd.appendChild(opt);
        });
    }

    // Registrar venta
    function registrarVenta() {
        const categoria = document.getElementById('categoria').value;
        const productoSelect = document.getElementById('producto');
        const cantidad = parseInt(document.getElementById('cantidad').value, 10);
        const msgDiv = document.getElementById('mensaje');

        if (!categoria) {
            mostrarMensaje('Selecciona una categoría', 'error');
            return;
        }
        if (!productoSelect.value) {
            mostrarMensaje('Selecciona un producto', 'error');
            return;
        }
        if (isNaN(cantidad) || cantidad < 1) {
            mostrarMensaje('Cantidad inválida', 'error');
            return;
        }

        const prodData = JSON.parse(productoSelect.value);
        const venta = {
            producto: {
                categoria: categoria,
                nombre: prodData.nombre,
                tamaño: prodData.tamaño,
                precio: prodData.precio
            },
            cantidad: cantidad,
            timestamp: new Date().toISOString()
        };

        const ventas = JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
        ventas.push(venta);
        localStorage.setItem(STORAGE_KEY, JSON.stringify(ventas));

        mostrarMensaje('✅ Venta registrada', 'success');
        document.getElementById('cantidad').value = 1;
        if (!document.getElementById('adminPanel').classList.contains('oculto')) {
            actualizarResumenAdmin();
        }
    }

    function mostrarMensaje(texto, tipo) {
        const msg = document.getElementById('mensaje');
        msg.textContent = texto;
        msg.className = `mensaje ${tipo}`;
        setTimeout(() => {
            msg.style.display = 'none';
            msg.className = 'mensaje';
        }, 2500);
    }

    // ADMINISTRACIÓN
    function loginAdmin() {
        const pwd = document.getElementById('password').value;
        if (pwd === ADMIN_PASSWORD) {
            document.getElementById('adminLogin').classList.add('oculto');
            document.getElementById('adminPanel').classList.remove('oculto');
            actualizarResumenAdmin();
        } else {
            alert('Contraseña incorrecta');
        }
    }

    function cerrarSesion() {
        document.getElementById('adminLogin').classList.remove('oculto');
        document.getElementById('adminPanel').classList.add('oculto');
        document.getElementById('password').value = '';
    }

    function actualizarResumenAdmin() {
        const ventas = JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
        const resumen = {};

        ventas.forEach(v => {
            const key = `${v.producto.categoria}|${v.producto.nombre}|${v.producto.tamaño}`;
            if (!resumen[key]) {
                resumen[key] = {
                    categoria: v.producto.categoria,
                    nombre: v.producto.nombre,
                    tamaño: v.producto.tamaño,
                    precio: v.producto.precio,
                    cantidad: 0,
                    ingreso: 0
                };
            }
            resumen[key].cantidad += v.cantidad;
            resumen[key].ingreso += v.cantidad * v.producto.precio;
        });

        let html = '<table><tr><th>Categoría</th><th>Producto</th><th>Tamaño</th><th>Precio</th><th>Cantidad</th><th>Ingreso</th></tr>';
        let totalGlobal = 0;
        const sorted = Object.values(resumen).sort((a,b) => a.categoria.localeCompare(b.categoria));
        sorted.forEach(item => {
            html += `<tr>
                <td>${item.categoria}</td>
                <td>${item.nombre}</td>
                <td>${item.tamaño}</td>
                <td>$${item.precio.toFixed(2)}</td>
                <td>${item.cantidad}</td>
                <td>$${item.ingreso.toFixed(2)}</td>
            </tr>`;
            totalGlobal += item.ingreso;
        });
        html += `<tr class="total-row"><td colspan="5"><strong>TOTAL GENERAL</strong></td><td><strong>$${totalGlobal.toFixed(2)}</strong></td></tr>`;
        html += '</table>';
        document.getElementById('resumenVentas').innerHTML = html;
    }

    function reiniciarVentas() {
        if (confirm('¿Eliminar TODAS las ventas registradas?')) {
            localStorage.removeItem(STORAGE_KEY);
            actualizarResumenAdmin();
            alert('Ventas reiniciadas');
        }
    }
</script>
